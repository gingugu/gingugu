name: Release

# Publishes to PyPI when a version tag is pushed (e.g. v0.2.0).
# Uses PyPI Trusted Publishing (OIDC) — no API token stored in GitHub.
# One-time PyPI setup required: pypi.org → gingugu project → Settings →
# Publishing → add a GitHub Actions publisher with
#   owner=gingugu, repo=gingugu, workflow=release.yml (leave environment blank)
on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      id-token: write # required for Trusted Publishing (OIDC)
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Sync dependencies
        run: uv sync --extra dev --python 3.12

      - name: Test (gate release on green)
        run: uv run pytest

      - name: Verify tag matches package version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG=$(uv run python -c "import importlib.metadata as m; print(m.version('gingugu'))")
          echo "tag=$TAG package=$PKG"
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::Tag v$TAG does not match package version $PKG"
            exit 1
          fi

      - name: Build sdist + wheel
        run: uv build

      - name: Publish to PyPI (Trusted Publishing)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
