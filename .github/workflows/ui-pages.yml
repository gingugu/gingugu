name: Deploy UI to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'ui/**'
      - '.github/workflows/ui-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ui/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Build
        env:
          VITE_BASE: /gingugu/
        run: npm run build
      - uses: actions/configure-pages@v5
        with:
          # Auto-enable Pages (build via GitHub Actions) on first run instead of
          # failing with "Get Pages site failed / Not Found" when it's not yet on.
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ui/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
